[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ComfyUI-Feixue-UniversalMonitor"
version = "3.2.3"
description = "飞雪监测器 — Emerald Capsule 实时硬件监测，AMD GPU 优化"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "Feixue", email = "feixue@example.com"}
]
requires-python = ">=3.10"
dependencies = [
    "psutil>=5.9.0",
    "torch>=2.5.0",
    "orjson>=3.9.0",
]
optional-dependencies = {dev = ["pytest>=7.0", "pytest-cov>=4.0"]}

[project.urls]
Repository = "https://github.com/feixue-ai/ComfyUI-Feixue-UniversalMonitor"

[tool.setuptools.packages.find]
include = ["core*", "collectors*", "providers*", "utils*", "config*"]

[tool.comfy]
PublisherId = "feixue"
DisplayName = "飞雪监测器 - Feixue Universal Monitor"
Icon = "https://raw.githubusercontent.com/feixue-ai/ComfyUI-Feixue-UniversalMonitor/main/feixue-ai/feixue-icon.png"
Description = "飞雪监测器 (Feixue Universal Monitor) — v3.2.3 胶囊高负载跳动修复+样式还原. Real-time hardware monitor for ComfyUI with 5 color themes × 5 style presets (Capsule/Titanium/Biolume/Blueprint/Pixel). Monitor GPU utilization, VRAM, CPU, RAM, swap memory, GPU temperature, disk I/O, and network speed. Features: emerald capsule UI with 3D cylindrical gradient effect, multi-layer soft shadows, CSS-drawn chip icons, WebSocket real-time push, drag-to-reposition with position memory. EMA smoothing for AMD SMI gfx_activity. pynvml-first GPU detection priority for maximum accuracy. Fixed capsule bounce during high workload (flex-basis:0 + width constraint). Restored original capsule 3D shape from v13 demo. Optimized for AMD GPUs on Windows (pynvml/WMI) and Linux (amdsmi/ROCm/sysfs). Keywords: feixue, monitor, hardware, gpu, vram, cpu, ram, temperature, system, resource, performance, amd, rocm, capsule, titan, biolume, blueprint, pixel, widget, overlay, status, dashboard, swap, disk, network, style, theme, glass, obsidian."

[tool.black]
line-length = 100
target-version = ['py310']

[tool.ruff]
line-length = 100
select = ["E", "F", "W", "I", "N"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short --strict-markers"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "windows: marks tests as Windows-only",
    "linux: marks tests as Linux-only",
    "requires_gpu: marks tests that need a physical GPU"
]
