[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ComfyUI-Feixue-UniversalMonitor"
version = "3.0.1"
description = "全功能硬件监视器自定义节点，专为 AMD GPU 优化"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "Feixue", email = "feixue@example.com"}
]
requires-python = ">=3.10"
dependencies = [
    "psutil>=5.9.0",
    "torch>=2.5.0",
    "orjson>=3.9.0",
]
optional-dependencies = {dev = ["pytest>=7.0", "pytest-cov>=4.0"]}

[project.urls]
Repository = "https://github.com/feixue-ai/ComfyUI-Feixue-UniversalMonitor"

[tool.setuptools.packages.find]
include = ["core*", "collectors*", "providers*", "utils*", "config*"]

[tool.comfy]
PublisherId = "feixue"
DisplayName = "飞雪监测器 - Feixue Universal Monitor"
Icon = "https://raw.githubusercontent.com/feixue-ai/ComfyUI-Feixue-UniversalMonitor/main/feixue-ai/feixue-icon.png"
Description = "Feixue Universal Monitor - 飞雪监测器. A cyberpunk-style real-time hardware monitor for ComfyUI. Monitor GPU utilization, VRAM usage, CPU load, RAM, swap memory, and GPU temperature. Features emerald capsule UI with neon glow, 5 color themes (neon green/cyber blue/amber gold/deep purple/sakura pink), 4 material modes (crystal glass/frosted/metallic/minimal), and 2 performance profiles. Optimized for AMD GPUs (ROCm/sysfs) on Linux Ubuntu. Keywords: feixue, monitor, hardware, gpu, vram, cpu, ram, temperature, system, resource, performance, amd, rocm, cyberpunk, capsule, glass, widget, overlay, status, dashboard."

[tool.black]
line-length = 100
target-version = ['py310']

[tool.ruff]
line-length = 100
select = ["E", "F", "W", "I", "N"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short --strict-markers"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "windows: marks tests as Windows-only",
    "linux: marks tests as Linux-only",
    "requires_gpu: marks tests that need a physical GPU"
]
